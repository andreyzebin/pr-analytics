bitbucket:
  # Base URL of your Bitbucket Server instance (without /rest/api)
  url: ""

  # Personal Access Token — set via env var, not here
  token: "${BB_TOKEN}"

  # Custom CA bundle — needed when Bitbucket uses a private/corporate cert
  # Can be set via REQUESTS_CA_BUNDLE env var instead
  ca_bundle: "${REQUESTS_CA_BUNDLE}"

  # mTLS client certificate (PEM) — leave empty if not required
  # Can be set via BITBUCKET_SERVER_CLIENT_CERT env var instead
  client_cert: "${BITBUCKET_SERVER_CLIENT_CERT}"

cache:
  # SQLite database file path (relative to working directory)
  db: output/bitbucket_cache.db

  # Number of parallel threads for fetching repos/PRs
  concurrency: 4

judge:
  # Model used as LLM judge for analyze-feedback command
  model: "claude-opus-4-6"

  # Anthropic API key — set via env var
  api_key: "${ANTHROPIC_API_KEY}"

  # Optional: OpenAI-compatible base URL (leave empty for Anthropic)
  # base_url: "https://api.openai.com/v1"
